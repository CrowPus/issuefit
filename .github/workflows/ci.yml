name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  checks:
    name: Format, lint, types, unit tests, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

  migrations:
    name: Validate database migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: issuefit
          POSTGRES_PASSWORD: issuefit
          POSTGRES_DB: issuefit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U issuefit -d issuefit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://issuefit:issuefit@localhost:5432/issuefit
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply migrations to a clean database
        run: pnpm db:migrate
      - name: Check schema and migrations are in sync
        run: |
          pnpm db:generate
          git diff --exit-code -- packages/database/drizzle

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: issuefit
          POSTGRES_PASSWORD: issuefit
          POSTGRES_DB: issuefit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U issuefit -d issuefit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://issuefit:issuefit@localhost:5432/issuefit
      # Dummy values: e2e covers page rendering and the anonymous-session
      # redirect, never a real OAuth exchange against GitHub.
      BETTER_AUTH_SECRET: ci-only-dummy-secret-0123456789abcdef
      GITHUB_CLIENT_ID: ci-dummy-client-id
      GITHUB_CLIENT_SECRET: ci-dummy-client-secret
      GITHUB_SERVICE_TOKEN: ci-dummy-service-token
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build
      - run: pnpm db:migrate
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level high
