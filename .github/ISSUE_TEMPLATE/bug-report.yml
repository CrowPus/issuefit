name: Bug report
description: Something does not work as expected.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please do **not** report security
        vulnerabilities here — follow [SECURITY.md](../../SECURITY.md) instead.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `pnpm dev`
        2. Open http://localhost:3000
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, Node.js version, pnpm version, browser if relevant.
      placeholder: |
        OS: macOS 15
        Node: 22.11.0
        pnpm: 11.15.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant logs. Remove tokens, connection strings, and personal data.
      render: shell
