# Production stack: PgBouncer + web + worker + Caddy (auto-HTTPS).
# Postgres is NOT run here — it's an external, separately-hosted server you
# provide (POSTGRES_HOST). This VM only pools connections to it.
# Usage:  docker compose -f docker-compose.prod.yml up -d --build
# All values come from the .env file next to this file (see .env.production.example).

services:
  # Pools connections to your external Postgres server. Clients (web, worker)
  # connect to pgbouncer on 6432; pgbouncer forwards to POSTGRES_HOST:POSTGRES_PORT.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: ${POSTGRES_HOST}
      DB_PORT: ${POSTGRES_PORT:-5432}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      LISTEN_PORT: 6432
    restart: unless-stopped

  # One-shot: applies database migrations, then exits. Connects to Postgres
  # directly (not through PgBouncer) because migrations run DDL.
  #
  # migrate, web, and worker all build from the same Dockerfile and share one
  # image tag (below) so Docker builds and stores it ONCE instead of three
  # times — each container just runs a different command against the same
  # image. Without a shared tag, Compose treats each `build:` as a separate
  # image, tripling disk usage on every deploy (this took down a 9.7GB VM).
  migrate:
    build: .
    image: issuefit-app:latest
    # Checks raw TCP connectivity to Postgres first (see scripts/wait-for-postgres.sh)
    # so an unreachable host/closed port is reported clearly, since drizzle-kit's
    # own spinner UI otherwise swallows the real connection error in Docker logs.
    # CI=true asks drizzle-kit to skip interactive rendering for the same reason.
    command: sh -c "bash scripts/wait-for-postgres.sh && CI=true pnpm --filter @issuefit/database db:migrate"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
    restart: "no"

  web:
    image: issuefit-app:latest
    command: pnpm --filter @issuefit/web start
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    image: issuefit-app:latest
    command: pnpm --filter @issuefit/worker start
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # Terminates HTTPS and proxies to the web container. Gets a free
  # Let's Encrypt certificate automatically for ${DOMAIN}.
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
