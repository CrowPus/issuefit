services:
  postgres:
    image: postgres:16-alpine
    container_name: issuefit-postgres
    environment:
      POSTGRES_USER: issuefit
      POSTGRES_PASSWORD: issuefit
      POSTGRES_DB: issuefit
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U issuefit -d issuefit"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
